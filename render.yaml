services:
  - type: web
    name: krispies-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 8h
      # Secrets below are intentionally NOT stored here (sync: false) — set
      # their real values once in the Render dashboard → Environment tab.
      # Never commit actual credentials to render.yaml; see backend/.env.example.
      - key: ADMIN_PASSWORD
        sync: false
      - key: FRONTEND_URL
        value: https://www.krispies.in
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: DB_PATH
        value: /var/data/krispies.db
      - key: UPLOAD_DIR
        value: /var/data/uploads
    disk:
      name: krispies-data
      mountPath: /var/data
      sizeGB: 1
