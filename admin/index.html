<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — Krispie's</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" href="../assets/logo.png" type="image/png">
  <link rel="stylesheet" href="admin.css">
</head>
<body>

  <div class="login-page">
    <div class="login-card">
      <img src="../assets/logo.png" alt="Krispie's" class="login-card__logo">
      <h1 class="login-card__title">Admin Panel</h1>
      <p class="login-card__sub">Your Celebrations Partner</p>

      <div class="login-card__error" id="loginError">Incorrect password. Please try again.</div>

      <form class="login-card__form" id="loginForm" novalidate>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" class="form-control" placeholder="Enter admin password" autocomplete="current-password" required>
        </div>
        <button type="submit" class="btn btn-primary login-card__btn" id="loginBtn">Access Dashboard →</button>
      </form>

      <p class="login-card__hint">
        Session expires when you close the browser tab.
      </p>
    </div>
  </div>

  <script src="admin.js"></script>
  <script>
    // Redirect if already logged in and token is still valid
    (function () {
      const token = sessionStorage.getItem(SESSION_KEY);
      if (token) {
        try {
          const p = JSON.parse(atob(token.split('.')[1].replace(/-/g,'+').replace(/_/g,'/')));
          if (p.exp * 1000 > Date.now()) window.location.href = 'dashboard';
        } catch {}
      }
    })();

    document.getElementById('loginForm').addEventListener('submit', async e => {
      e.preventDefault();
      const pw  = document.getElementById('password').value;
      const err = document.getElementById('loginError');
      const btn = document.getElementById('loginBtn');

      btn.disabled    = true;
      btn.textContent = 'Signing in…';
      err.style.display = 'none';

      try {
        const ok = await login(pw);
        if (ok) {
          window.location.href = 'dashboard';
        } else {
          err.textContent       = 'Incorrect password. Please try again.';
          err.style.display     = 'block';
          document.getElementById('password').value = '';
          document.getElementById('password').focus();
        }
      } catch {
        err.textContent   = 'Could not reach server. Check your connection.';
        err.style.display = 'block';
      } finally {
        btn.disabled    = false;
        btn.textContent = 'Access Dashboard →';
      }
    });
  </script>
</body>
</html>
