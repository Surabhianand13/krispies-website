<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Products — Krispie's Admin</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="stylesheet" href="admin.css">
</head>
<body>
<div class="admin-layout">
  <aside class="sidebar">
    <div class="sidebar__brand"><div class="sidebar__brand-name">🎂 Krispie's</div><div class="sidebar__brand-sub">Admin Panel</div></div>
    <nav class="sidebar__nav">
      <div class="sidebar__section-label">Main</div>
      <a href="dashboard.html" class="sidebar__link"><span class="sidebar__icon">📊</span> Dashboard</a>
      <a href="analytics.html" class="sidebar__link"><span class="sidebar__icon">📈</span> Analytics</a>
      <div class="sidebar__section-label">Manage</div>
      <a href="orders.html"    class="sidebar__link"><span class="sidebar__icon">📦</span> Orders</a>
      <a href="enquiries.html" class="sidebar__link"><span class="sidebar__icon">💬</span> Enquiries</a>
      <a href="products.html"  class="sidebar__link active"><span class="sidebar__icon">🛍️</span> Products</a>
    </nav>
    <div class="sidebar__footer"><button class="sidebar__logout" onclick="logout()">↩ Logout</button></div>
  </aside>

  <main class="admin-main">
    <div class="topbar">
      <div><div class="topbar__title">Products</div><div class="topbar__sub" id="prod-count">Loading…</div></div>
      <div class="topbar__actions">
        <button class="btn btn-primary" onclick="openAddProduct()">+ Add Product</button>
      </div>
    </div>

    <div class="page-body">
      <div class="action-row">
        <input type="search" id="search" placeholder="Search products…" oninput="filterProducts()">
        <select id="filter-cat" onchange="filterProducts()">
          <option value="">All Categories</option>
          <option value="birthday-cakes">Birthday Cakes</option>
          <option value="wedding-cakes">Wedding Cakes</option>
          <option value="engagement-cakes">Engagement Cakes</option>
          <option value="birthday-theme-cakes">Birthday Theme Cakes</option>
          <option value="baby-shower-cakes">Baby Shower Cakes</option>
          <option value="customized-cakes">Customized Cakes</option>
          <option value="cheesecakes">Cheesecakes</option>
          <option value="donuts">Donuts</option>
          <option value="biscuits">Biscuits</option>
        </select>
        <select id="filter-status" onchange="filterProducts()">
          <option value="">All Status</option>
          <option value="active">Active</option>
          <option value="inactive">Inactive</option>
          <option value="featured">Featured</option>
        </select>
        <div class="spacer"></div>
        <span id="filtered-count" style="font-size:0.78rem;color:var(--text-3);"></span>
      </div>

      <div class="card full-col">
        <div class="tbl-wrap">
          <table>
            <thead>
              <tr>
                <th>Product</th>
                <th>Category</th>
                <th>MRP</th>
                <th>Price</th>
                <th>Tag</th>
                <th>Active</th>
                <th>Featured</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="products-tbody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- Product Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal modal--lg">
    <div class="modal__hd">
      <h3 id="modalTitle">Add Product</h3>
      <button class="modal__close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal__body" id="modalBody"></div>
    <div class="modal__ft">
      <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" id="modalSaveBtn">Save Product</button>
    </div>
  </div>
</div>

<script src="admin.js"></script>
<script>
'use strict';
if (!checkAuth()) throw new Error('Not authenticated');

let allProducts = [];

async function loadProducts() {
  try {
    allProducts = await apiFetch('/api/products?all=1');
    document.getElementById('prod-count').textContent = `${allProducts.length} products total`;
    renderProducts(allProducts);
  } catch (e) {
    showToast('Failed to load products', 'error');
  }
}

function filterProducts() {
  const q      = document.getElementById('search').value.toLowerCase();
  const cat    = document.getElementById('filter-cat').value;
  const status = document.getElementById('filter-status').value;
  let list = allProducts.filter(p => {
    if (q && !p.name.toLowerCase().includes(q) && !p.description.toLowerCase().includes(q)) return false;
    if (cat && p.category !== cat) return false;
    if (status === 'active'   && !p.active)   return false;
    if (status === 'inactive' && p.active)    return false;
    if (status === 'featured' && !p.featured) return false;
    return true;
  });
  document.getElementById('filtered-count').textContent = `${list.length} shown`;
  renderProducts(list);
}

function renderProducts(list) {
  const tb = document.getElementById('products-tbody');
  if (!list.length) {
    tb.innerHTML = `<tr><td colspan="8"><div class="empty-state"><div class="icon">🛍️</div>No products found</div></td></tr>`;
    return;
  }
  tb.innerHTML = list.map(p => `
    <tr id="row-${p.id}">
      <td>
        <div class="td-name">${esc(p.name)}</div>
        <div class="td-muted" style="font-size:0.7rem;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(p.description)}</div>
        ${p.images?.length ? `<img src="${esc(p.images[0])}" style="width:36px;height:36px;object-fit:cover;border-radius:4px;margin-top:4px;" onerror="this.style.display='none'">` : ''}
      </td>
      <td><span class="badge badge-none" style="font-size:0.63rem;">${CATEGORY_LABELS[p.category] || p.category}</span></td>
      <td>${p.mrp ? fmtPrice(p.mrp) : '—'}</td>
      <td><strong>${p.variantGroups?.length ? 'From ' : ''}${p.price ? fmtPrice(p.price) : '—'}</strong>${(p.discount && !p.variantGroups?.length) ? `<br><span class="td-muted" style="font-size:0.68rem;">${p.discount}% off</span>` : ''}</td>
      <td>${tagBadge(p.tag)}</td>
      <td>
        <label class="toggle" title="${p.active ? 'Click to deactivate' : 'Click to activate'}">
          <input type="checkbox" ${p.active ? 'checked' : ''} onchange="toggleActive('${p.id}', this)">
          <span class="toggle-slider"></span>
        </label>
      </td>
      <td>
        <label class="toggle" title="${p.featured ? 'Click to unfeature' : 'Click to feature on homepage'}">
          <input type="checkbox" ${p.featured ? 'checked' : ''} onchange="toggleFeatured('${p.id}', this)">
          <span class="toggle-slider"></span>
        </label>
      </td>
      <td>
        <div style="display:flex;gap:6px;">
          <button class="btn btn-outline btn-sm btn-icon" onclick="openEditProduct('${p.id}')" title="Edit">✏️</button>
          <button class="btn btn-danger  btn-sm btn-icon" onclick="deleteProduct('${p.id}', '${esc(p.name)}')" title="Delete">🗑️</button>
        </div>
      </td>
    </tr>`).join('');
}

async function toggleActive(id, cb) {
  try {
    const updated = await apiFetch(`/api/products/${id}/toggle-active`, 'PATCH');
    const idx = allProducts.findIndex(p => p.id === id);
    if (idx !== -1) allProducts[idx] = updated;
    cb.checked = updated.active;
    showToast(updated.active ? 'Product activated — now visible on website' : 'Product deactivated — hidden from website');
  } catch (e) { showToast('Failed to update', 'error'); cb.checked = !cb.checked; }
}

async function toggleFeatured(id, cb) {
  try {
    const updated = await apiFetch(`/api/products/${id}/toggle-featured`, 'PATCH');
    const idx = allProducts.findIndex(p => p.id === id);
    if (idx !== -1) allProducts[idx] = updated;
    cb.checked = updated.featured;
    showToast(updated.featured ? 'Now featured on homepage' : 'Removed from homepage');
  } catch (e) { showToast('Failed to update', 'error'); cb.checked = !cb.checked; }
}

const BASE_CATEGORIES = [
  ['birthday-cakes','Birthday Cakes'],['wedding-cakes','Wedding Cakes'],
  ['engagement-cakes','Engagement Cakes'],['birthday-theme-cakes','Birthday Theme Cakes'],
  ['baby-shower-cakes','Baby Shower Cakes'],['customized-cakes','Customized Cakes'],
  ['cheesecakes','Cheesecakes'],['donuts','Donuts'],['biscuits','Biscuits'],
];

function slugify(s) {
  return String(s || '').toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
}

function productForm(p = {}) {
  const images = p.images || [];
  // Category list: base categories plus any custom ones already used by existing products,
  // so a category someone typed in as "Other" shows up as a real option from then on.
  const knownCats = new Set(BASE_CATEGORIES.map(([v]) => v));
  const extraCats = [...new Set(allProducts.map(x => x.category))].filter(c => c && !knownCats.has(c));
  const catOptions = [...BASE_CATEGORIES, ...extraCats.map(c => [c, CATEGORY_LABELS[c] || c])];

  return `
    <div class="form-grid-2">
      <div class="form-row" style="grid-column:1/-1;">
        <label>Product Name *</label>
        <input id="f-name" value="${esc(p.name || '')}" placeholder="e.g. Chocolate Truffle Cake">
      </div>
      <div class="form-row">
        <label>URL Slug <span class="hint-inline">(auto-filled, editable)</span></label>
        <input id="f-slug" value="${esc(p.slug || '')}" placeholder="chocolate-truffle-cake">
      </div>
      <div class="form-row">
        <label>Category *</label>
        <select id="f-cat" onchange="document.getElementById('f-cat-custom').style.display = this.value === '__other__' ? 'block' : 'none'">
          ${catOptions.map(([v,l]) => `<option value="${v}" ${p.category===v?'selected':''}>${l}</option>`).join('')}
          <option value="__other__">+ Add new category…</option>
        </select>
        <input id="f-cat-custom" placeholder="new-category-slug" style="display:none;margin-top:6px;">
      </div>
      <div class="form-row">
        <label>Tag</label>
        <select id="f-tag">
          <option value="">None</option>
          <option value="bestseller" ${p.tag==='bestseller'?'selected':''}>⭐ Bestseller</option>
          <option value="new"        ${p.tag==='new'?'selected':''}>🆕 New</option>
          <option value="seasonal"   ${p.tag==='seasonal'?'selected':''}>🌸 Seasonal</option>
          <option value="custom"     ${p.tag==='custom'?'selected':''}>✨ Made to Order</option>
        </select>
      </div>
      <div class="form-row">
        <label>Prep Time <span class="hint-inline">(hours notice needed)</span></label>
        <input id="f-prep" type="number" min="0" value="${p.prepHours || 0}" placeholder="0">
      </div>
      <div class="form-row">
        <label>MRP (₹) *</label>
        <input id="f-mrp" type="number" min="0" value="${p.mrp || ''}" placeholder="999">
      </div>
      <div class="form-row">
        <label>Discount %</label>
        <input id="f-disc" type="number" min="0" max="100" value="${p.discount || 0}" placeholder="0">
        <div class="hint" id="price-preview"></div>
      </div>
      <div class="form-row" style="grid-column:1/-1;">
        <label>Description *</label>
        <textarea id="f-desc" rows="3" placeholder="Short description shown on product card">${esc(p.description || '')}</textarea>
      </div>
      <div class="form-row" style="grid-column:1/-1;">
        <label>Product Images</label>
        <div class="hint" style="margin-bottom:6px;">Paste a URL, or reference a local file your team dropped into
          <code>assets/images/products/&lt;category&gt;/&lt;filename&gt;.jpg</code> — e.g.
          <code id="img-hint-example">assets/images/products/${esc(p.category || 'birthday-cakes')}/${esc(slugify(p.name) || 'product-name')}-1.jpg</code>
        </div>
        <div class="img-list" id="img-list">${images.map((url,i) => `
          <div class="img-pill" id="imgp-${i}">
            <span class="img-pill__url" title="${esc(url)}">${esc(url)}</span>
            <button class="img-pill__rm" onclick="removeImg(${i})" type="button">✕</button>
          </div>`).join('')}</div>
        <div class="img-add-row">
          <input id="img-url-input" placeholder="Paste URL or assets/images/products/... path">
          <button class="btn btn-outline btn-sm" onclick="addImg()" type="button">+ Add</button>
        </div>
        <div class="img-preview" id="img-preview">
          ${images.map(url => `<img src="${esc(url)}" onerror="this.style.display='none'">`).join('')}
        </div>
      </div>
      <div class="form-row" style="grid-column:1/-1;">
        <label>Variants <span class="hint-inline">(optional — e.g. weight tiers or flavours with their own price)</span></label>
        <p class="hint" style="margin:-4px 0 10px;">Enter the actual final price for each option (e.g. Half Kg = 699, 1 Kg = 1199) — MRP and Discount above are ignored once a product has variants.</p>
        <div id="variant-groups"></div>
        <button class="btn btn-outline btn-sm" onclick="addVariantGroup()" type="button" style="margin-top:8px;">+ Add Option Group</button>
      </div>
      <div class="form-row">
        <label class="form-check"><input type="checkbox" id="f-active" ${p.active!==false?'checked':''}> Active (visible on website)</label>
      </div>
      <div class="form-row">
        <label class="form-check"><input type="checkbox" id="f-featured" ${p.featured?'checked':''}> Featured on homepage</label>
      </div>
    </div>`;
}

/* ── Variant group builder ──
   _editVariantGroups shape: [{ name, options: [{label, price}] }] -- each
   option's price is the final selling price for that choice (e.g. Half Kg
   = 699), not an add-on to the MRP/discount above. */
let _editVariantGroups = [];

function renderVariantGroups() {
  const container = document.getElementById('variant-groups');
  if (!container) return;
  container.innerHTML = _editVariantGroups.map((g, gi) => `
    <div class="variant-group">
      <div class="variant-group__hd">
        <input class="variant-group__name" placeholder="Group name, e.g. Weight" value="${esc(g.name)}"
          oninput="_editVariantGroups[${gi}].name = this.value">
        <button class="img-pill__rm" onclick="removeVariantGroup(${gi})" type="button" title="Remove group">✕</button>
      </div>
      <div class="variant-group__options">
        ${g.options.map((o, oi) => `
          <div class="variant-option-row">
            <input placeholder="Option label, e.g. Half Kg" value="${esc(o.label)}"
              oninput="_editVariantGroups[${gi}].options[${oi}].label = this.value">
            <input type="number" placeholder="Final price, e.g. 699" value="${o.price || 0}"
              oninput="_editVariantGroups[${gi}].options[${oi}].price = parseFloat(this.value) || 0">
            <button class="img-pill__rm" onclick="removeVariantOption(${gi}, ${oi})" type="button" title="Remove option">✕</button>
          </div>`).join('')}
        <button class="btn btn-outline btn-sm" onclick="addVariantOption(${gi})" type="button">+ Add Option</button>
      </div>
    </div>`).join('') || `<div class="hint">No variants — this product has a single fixed price.</div>`;
}

function addVariantGroup() {
  _editVariantGroups.push({ name: '', options: [{ label: '', price: 0 }] });
  renderVariantGroups();
}
function removeVariantGroup(gi) {
  _editVariantGroups.splice(gi, 1);
  renderVariantGroups();
}
function addVariantOption(gi) {
  _editVariantGroups[gi].options.push({ label: '', price: 0 });
  renderVariantGroups();
}
function removeVariantOption(gi, oi) {
  _editVariantGroups[gi].options.splice(oi, 1);
  renderVariantGroups();
}

// Manage image URLs in the form
let _editImages = [];

function addImg() {
  const input = document.getElementById('img-url-input');
  const url = input.value.trim();
  if (!url) return;
  _editImages.push(url);
  refreshImgUI();
  input.value = '';
}
function removeImg(i) {
  _editImages.splice(i, 1);
  refreshImgUI();
}
function refreshImgUI() {
  document.getElementById('img-list').innerHTML = _editImages.map((url, i) => `
    <div class="img-pill">
      <span class="img-pill__url" title="${esc(url)}">${esc(url)}</span>
      <button class="img-pill__rm" onclick="removeImg(${i})" type="button">✕</button>
    </div>`).join('');
  document.getElementById('img-preview').innerHTML = _editImages.map(url => `<img src="${esc(url)}" onerror="this.style.display='none'">`).join('');
}

function openAddProduct() {
  _editImages = [];
  _editVariantGroups = [];
  document.getElementById('modalTitle').textContent = 'Add Product';
  document.getElementById('modalBody').innerHTML = productForm();
  setupPricePreview();
  setupSlugAutofill();
  renderVariantGroups();
  document.getElementById('modalSaveBtn').onclick = () => saveProduct();
  document.getElementById('modalOverlay').classList.add('open');
}

function openEditProduct(id) {
  const p = allProducts.find(x => x.id === id);
  if (!p) return;
  _editImages = [...(p.images || [])];
  _editVariantGroups = (p.variantGroups || []).map(g => ({ name: g.name, options: g.options.map(o => ({ ...o })) }));
  document.getElementById('modalTitle').textContent = 'Edit Product';
  document.getElementById('modalBody').innerHTML = productForm(p);
  setupPricePreview();
  setupSlugAutofill(true);
  renderVariantGroups();
  document.getElementById('modalSaveBtn').onclick = () => saveProduct(id);
  document.getElementById('modalOverlay').classList.add('open');
}

function setupPricePreview() {
  const update = () => {
    const mrp  = parseFloat(document.getElementById('f-mrp')?.value) || 0;
    const disc = parseFloat(document.getElementById('f-disc')?.value) || 0;
    const price = disc > 0 ? Math.round(mrp * (1 - disc/100)) : mrp;
    const el = document.getElementById('price-preview');
    if (el && mrp > 0) el.textContent = disc > 0 ? `Final price: ₹${price.toLocaleString('en-IN')}` : '';
  };
  setTimeout(() => {
    document.getElementById('f-mrp')?.addEventListener('input', update);
    document.getElementById('f-disc')?.addEventListener('input', update);
  }, 50);
}

// Auto-fills the slug field from the product name, unless editing an
// existing product whose slug was already set (or the admin has typed
// their own slug already — tracked via a "touched" flag).
function setupSlugAutofill(isEdit = false) {
  let slugTouched = isEdit; // editing: don't clobber the existing slug on load
  setTimeout(() => {
    const nameEl = document.getElementById('f-name');
    const slugEl = document.getElementById('f-slug');
    const imgHint = document.getElementById('img-hint-example');
    const catEl = document.getElementById('f-cat');
    if (!nameEl || !slugEl) return;
    slugEl.addEventListener('input', () => { slugTouched = true; });
    const sync = () => {
      if (!slugTouched) slugEl.value = slugify(nameEl.value);
      if (imgHint) imgHint.textContent = `assets/images/products/${catEl?.value || 'birthday-cakes'}/${slugify(nameEl.value) || 'product-name'}-1.jpg`;
    };
    nameEl.addEventListener('input', sync);
    catEl?.addEventListener('change', sync);
  }, 50);
}

async function saveProduct(editId) {
  const name = document.getElementById('f-name').value.trim();
  const desc = document.getElementById('f-desc').value.trim();
  let cat  = document.getElementById('f-cat').value;
  if (cat === '__other__') cat = slugify(document.getElementById('f-cat-custom').value);
  if (!name || !desc || !cat) { showToast('Name, category and description are required', 'error'); return; }

  const body = {
    name, description: desc, category: cat,
    tag:           document.getElementById('f-tag').value || null,
    slug:          document.getElementById('f-slug').value.trim() || slugify(name),
    prepHours:     parseInt(document.getElementById('f-prep').value, 10) || 0,
    mrp:           parseFloat(document.getElementById('f-mrp').value) || 0,
    discount:      parseFloat(document.getElementById('f-disc').value) || 0,
    images:        JSON.stringify(_editImages),
    variantGroups: JSON.stringify(_editVariantGroups.filter(g => g.name.trim() && g.options.some(o => o.label.trim()))),
    active:        document.getElementById('f-active').checked,
    featured:      document.getElementById('f-featured').checked,
  };

  const btn = document.getElementById('modalSaveBtn');
  btn.textContent = 'Saving…'; btn.disabled = true;
  try {
    let saved;
    if (editId) {
      saved = await apiFetch(`/api/products/${editId}`, 'PUT', body);
      const idx = allProducts.findIndex(p => p.id === editId);
      if (idx !== -1) allProducts[idx] = saved;
      showToast('Product updated — changes are live on the website ✓');
    } else {
      saved = await apiFetch('/api/products', 'POST', body);
      allProducts.unshift(saved);
      showToast('Product added — now visible on the website ✓');
    }
    closeModal();
    document.getElementById('prod-count').textContent = `${allProducts.length} products total`;
    filterProducts();
  } catch (e) {
    showToast(e.message || 'Failed to save', 'error');
  } finally {
    btn.textContent = 'Save Product'; btn.disabled = false;
  }
}

async function deleteProduct(id, name) {
  if (!confirm(`Delete "${name}"? This cannot be undone.`)) return;
  try {
    await apiFetch(`/api/products/${id}`, 'DELETE');
    allProducts = allProducts.filter(p => p.id !== id);
    document.getElementById('prod-count').textContent = `${allProducts.length} products total`;
    filterProducts();
    showToast('Product deleted');
  } catch (e) { showToast('Failed to delete', 'error'); }
}

loadProducts();
</script>
</body>
</html>
