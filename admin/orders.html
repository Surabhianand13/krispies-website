<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orders — Krispie's Admin</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="stylesheet" href="admin.css">
</head>
<body>
<div class="admin-layout">
  <aside class="sidebar">
    <div class="sidebar__brand"><div class="sidebar__brand-name">🎂 Krispie's</div><div class="sidebar__brand-sub">Admin Panel</div></div>
    <nav class="sidebar__nav">
      <div class="sidebar__section-label">Main</div>
      <a href="dashboard.html" class="sidebar__link"><span class="sidebar__icon">📊</span> Dashboard</a>
      <a href="analytics.html" class="sidebar__link"><span class="sidebar__icon">📈</span> Analytics</a>
      <div class="sidebar__section-label">Manage</div>
      <a href="orders.html"    class="sidebar__link active"><span class="sidebar__icon">📦</span> Orders <span class="sidebar__badge" id="sb-orders">0</span></a>
      <a href="enquiries.html" class="sidebar__link"><span class="sidebar__icon">💬</span> Enquiries <span class="sidebar__badge" id="sb-enquiries">0</span></a>
      <a href="products.html"  class="sidebar__link"><span class="sidebar__icon">🛍️</span> Products</a>
      <a href="addons.html"    class="sidebar__link"><span class="sidebar__icon">🎈</span> Add-ons</a>
    </nav>
    <div class="sidebar__footer"><button class="sidebar__logout" onclick="logout()">↩ Logout</button></div>
  </aside>

  <main class="admin-main">
    <div class="topbar">
      <div><div class="topbar__title">Orders</div><div class="topbar__sub" id="order-sub">Loading…</div></div>
      <div class="topbar__actions">
        <button class="btn btn-outline btn-sm" onclick="exportCSV()">⬇ Export CSV</button>
        <button class="btn btn-primary" onclick="openLogOrder()">+ Log Order</button>
      </div>
    </div>

    <div class="page-body">

      <!-- KPI strip -->
      <div class="kpi-grid" style="grid-template-columns:repeat(5,1fr);">
        <div class="kpi-card kpi-card--orange"><div class="kpi-card__label">Pending</div><div class="kpi-card__value" id="cnt-pending">—</div><div class="kpi-card__icon">⏳</div></div>
        <div class="kpi-card kpi-card--blue"><div class="kpi-card__label">Confirmed</div><div class="kpi-card__value" id="cnt-confirmed">—</div><div class="kpi-card__icon">✅</div></div>
        <div class="kpi-card kpi-card--brand"><div class="kpi-card__label">Ready</div><div class="kpi-card__value" id="cnt-ready">—</div><div class="kpi-card__icon">🎂</div></div>
        <div class="kpi-card kpi-card--green"><div class="kpi-card__label">Delivered</div><div class="kpi-card__value" id="cnt-delivered">—</div><div class="kpi-card__icon">🚀</div></div>
        <div class="kpi-card kpi-card--purple"><div class="kpi-card__label">Revenue (month)</div><div class="kpi-card__value" id="cnt-revenue">—</div><div class="kpi-card__icon">💰</div></div>
      </div>

      <!-- Filters -->
      <div class="action-row">
        <input type="search" id="search" placeholder="Search name or items…" oninput="filterOrders()">
        <select id="f-status" onchange="filterOrders()">
          <option value="">All Statuses</option>
          <option value="pending">Pending</option>
          <option value="confirmed">Confirmed</option>
          <option value="ready">Ready</option>
          <option value="delivered">Delivered</option>
          <option value="cancelled">Cancelled</option>
        </select>
        <select id="f-outlet" onchange="filterOrders()">
          <option value="">All Outlets</option>
          <option value="lalbazar">Lalbazar</option>
          <option value="suchitra">Suchitra</option>
          <option value="boduppal">Boduppal</option>
          <option value="ramantapur">Ramantapur</option>
          <option value="tukkuguda">Tukkuguda</option>
        </select>
        <select id="f-date" onchange="filterOrders()">
          <option value="">Any Date</option>
          <option value="today">Today</option>
          <option value="tomorrow">Tomorrow (deliveries)</option>
          <option value="week">This Week</option>
        </select>
        <div class="spacer"></div>
        <span id="filtered-count" style="font-size:0.78rem;color:var(--text-3);"></span>
      </div>

      <!-- Orders table -->
      <div class="card full-col">
        <div class="tbl-wrap">
          <table>
            <thead>
              <tr>
                <th>Customer</th>
                <th>Items</th>
                <th>Amount</th>
                <th>Outlet</th>
                <th>Delivery Date</th>
                <th>Payment</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="orders-tbody"></tbody>
          </table>
        </div>
      </div>

    </div>
  </main>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal modal--lg">
    <div class="modal__hd"><h3 id="modalTitle">Log Order</h3><button class="modal__close" onclick="closeModal()">✕</button></div>
    <div class="modal__body" id="modalBody"></div>
    <div class="modal__ft">
      <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" id="modalSaveBtn">Save Order</button>
    </div>
  </div>
</div>

<script src="admin.js"></script>
<script>
'use strict';
if (!checkAuth()) throw new Error('Not authenticated');

let allOrders = [];

async function loadOrders() {
  try {
    const res = await apiFetch('/api/orders?limit=200');
    allOrders = Array.isArray(res) ? res : (res.orders || []);
    renderKPIs();
    renderOrders(allOrders);
    document.getElementById('order-sub').textContent = `${allOrders.length} total orders`;

    // Sidebar badges from live endpoint
    const live = await apiFetch('/api/analytics/live');
    document.getElementById('sb-orders').textContent    = live.pendingOrders || 0;
    document.getElementById('sb-enquiries').textContent = live.unreadEnquiries || 0;
  } catch (e) { showToast('Failed to load orders', 'error'); }
}

function renderKPIs() {
  const counts = {};
  let monthRev = 0;
  const monthAgo = new Date(); monthAgo.setDate(monthAgo.getDate() - 30);
  allOrders.forEach(o => {
    counts[o.status] = (counts[o.status] || 0) + 1;
    if (o.status === 'delivered' && new Date(o.created_at || o.createdAt) >= monthAgo) {
      monthRev += parseFloat(o.amount || 0);
    }
  });
  ['pending','confirmed','ready','delivered'].forEach(s => {
    document.getElementById(`cnt-${s}`).textContent = counts[s] || 0;
  });
  document.getElementById('cnt-revenue').textContent = fmtPrice(monthRev);
}

function filterOrders() {
  const q      = document.getElementById('search').value.toLowerCase();
  const status = document.getElementById('f-status').value;
  const outlet = document.getElementById('f-outlet').value;
  const date   = document.getElementById('f-date').value;
  const today  = new Date().toISOString().slice(0,10);
  const tomorrow = new Date(Date.now()+86400000).toISOString().slice(0,10);
  const weekEnd  = new Date(Date.now()+7*86400000).toISOString().slice(0,10);

  const list = allOrders.filter(o => {
    if (q && !((o.customer_name||o.customerName||'').toLowerCase().includes(q)) && !(o.items||'').toLowerCase().includes(q)) return false;
    if (status && o.status !== status) return false;
    if (outlet && o.outlet !== outlet) return false;
    if (date === 'today'    && (o.order_date||o.orderDate||'').slice(0,10) !== today) return false;
    if (date === 'tomorrow' && (o.delivery_date||o.deliveryDate||'').slice(0,10) !== tomorrow) return false;
    if (date === 'week') {
      const dd = (o.delivery_date||o.deliveryDate||'').slice(0,10);
      if (dd < today || dd > weekEnd) return false;
    }
    return true;
  });
  document.getElementById('filtered-count').textContent = `${list.length} shown`;
  renderOrders(list);
}

function renderOrders(list) {
  const tb = document.getElementById('orders-tbody');
  if (!list.length) { tb.innerHTML = `<tr><td colspan="8"><div class="empty-state"><div class="icon">📦</div>No orders found</div></td></tr>`; return; }
  tb.innerHTML = list.map(o => {
    const name     = esc(o.customer_name || o.customerName || '—');
    const phone    = o.customer_phone || o.customerPhone || '';
    const delivery = (o.delivery_date || o.deliveryDate || '').slice(0,10);
    const isToday  = delivery === new Date().toISOString().slice(0,10);
    const isTomr   = delivery === new Date(Date.now()+86400000).toISOString().slice(0,10);
    const delBadge = isToday ? '🔴 Today' : isTomr ? '🟡 Tomorrow' : fmtDate(delivery);
    return `<tr>
      <td>
        <div class="td-name">${name}</div>
        ${phone ? `<div class="td-muted" style="font-size:0.7rem;">${esc(phone)}</div>` : ''}
      </td>
      <td style="max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" class="td-muted">${esc(o.items || '—')}</td>
      <td><strong>${fmtPrice(o.amount)}</strong></td>
      <td class="td-muted">${OUTLET_LABELS[o.outlet] || o.outlet || '—'}</td>
      <td style="white-space:nowrap;">${delBadge}</td>
      <td class="td-muted" style="font-size:0.72rem;">${esc(o.payment_method || o.paymentMethod || '—')}</td>
      <td>
        <select class="status-select" onchange="updateStatus('${o.id}', this.value, this)">
          ${['pending','confirmed','ready','delivered','cancelled'].map(s => `<option value="${s}" ${o.status===s?'selected':''}>${s.charAt(0).toUpperCase()+s.slice(1)}</option>`).join('')}
        </select>
      </td>
      <td>
        <div style="display:flex;gap:5px;flex-wrap:nowrap;">
          <button class="btn btn-outline btn-sm btn-icon" onclick="openEditOrder('${o.id}')" title="Edit">✏️</button>
          ${phone ? `<a class="btn btn-wa btn-sm btn-icon" href="https://wa.me/91${phone.replace(/\D/g,'')}?text=${encodeURIComponent('Hi '+decodeURIComponent(name)+', your Krispie\'s order is ready! Please let us know if you need any help.')}" target="_blank" rel="noopener" title="WhatsApp customer">💬</a>` : ''}
          <button class="btn btn-danger btn-sm btn-icon" onclick="deleteOrder('${o.id}')" title="Delete">🗑️</button>
        </div>
      </td>
    </tr>`;
  }).join('');
}

async function updateStatus(id, newStatus, select) {
  try {
    await apiFetch(`/api/orders/${id}`, 'PUT', { status: newStatus });
    const o = allOrders.find(x => x.id === id);
    if (o) o.status = newStatus;
    renderKPIs();
    showToast(`Order marked as ${newStatus}`);
  } catch (e) { showToast('Failed to update status', 'error'); }
}

function orderForm(o = {}) {
  const today = new Date().toISOString().slice(0,10);
  return `
    <div class="form-grid-2">
      <div class="form-row"><label>Customer Name *</label><input id="f-name" value="${esc(o.customer_name||o.customerName||'')}" placeholder="Full name"></div>
      <div class="form-row"><label>Phone</label><input id="f-phone" value="${esc(o.customer_phone||o.customerPhone||'')}" placeholder="+91 98765 43210"></div>
      <div class="form-row"><label>Email</label><input id="f-email" value="${esc(o.customer_email||o.customerEmail||'')}" placeholder="customer@example.com"></div>
      <div class="form-row" style="grid-column:1/-1;"><label>Items *</label><textarea id="f-items" rows="2" placeholder="Chocolate Truffle 1kg, Birthday Cake">${esc(o.items||'')}</textarea></div>
      <div class="form-row"><label>Amount (₹)</label><input id="f-amount" type="number" min="0" value="${o.amount||''}"></div>
      <div class="form-row"><label>Outlet</label>
        <select id="f-outlet">${[['','—'],['lalbazar','Lalbazar'],['suchitra','Suchitra'],['boduppal','Boduppal'],['ramantapur','Ramantapur'],['tukkuguda','Tukkuguda']].map(([v,l])=>`<option value="${v}" ${(o.outlet||'')==v?'selected':''}>${l}</option>`).join('')}</select>
      </div>
      <div class="form-row"><label>Order Date</label><input id="f-odate" type="date" value="${(o.order_date||o.orderDate||today).slice(0,10)}"></div>
      <div class="form-row"><label>Delivery Date</label><input id="f-ddate" type="date" value="${(o.delivery_date||o.deliveryDate||'').slice(0,10)}"></div>
      <div class="form-row"><label>Payment Method</label>
        <select id="f-pay">${[['','—'],['cod','Cash on Delivery'],['online','Online (Razorpay)'],['upi','UPI'],['cash','Cash at Store']].map(([v,l])=>`<option value="${v}" ${(o.payment_method||o.paymentMethod||'')==v?'selected':''}>${l}</option>`).join('')}</select>
      </div>
      <div class="form-row"><label>Platform</label>
        <select id="f-platform">${[['website','Website'],['phone','Phone'],['walk-in','Walk-in'],['bulk','Bulk / Corporate']].map(([v,l])=>`<option value="${v}" ${(o.platform||'website')==v?'selected':''}>${l}</option>`).join('')}</select>
      </div>
      <div class="form-row"><label>Status</label>
        <select id="f-status">${['pending','confirmed','ready','delivered','cancelled'].map(s=>`<option value="${s}" ${(o.status||'pending')==s?'selected':''}>${s.charAt(0).toUpperCase()+s.slice(1)}</option>`).join('')}</select>
      </div>
      <div class="form-row" style="grid-column:1/-1;"><label>Notes / Address</label><textarea id="f-notes" rows="2" placeholder="Delivery address, special instructions…">${esc(o.notes||'')}</textarea></div>
    </div>`;
}

function openLogOrder() {
  document.getElementById('modalTitle').textContent = 'Log New Order';
  document.getElementById('modalBody').innerHTML = orderForm();
  document.getElementById('modalSaveBtn').onclick = () => saveOrder();
  document.getElementById('modalOverlay').classList.add('open');
}

function openEditOrder(id) {
  const o = allOrders.find(x => x.id === id);
  if (!o) return;
  document.getElementById('modalTitle').textContent = 'Edit Order';
  document.getElementById('modalBody').innerHTML = orderForm(o);
  document.getElementById('modalSaveBtn').onclick = () => saveOrder(id);
  document.getElementById('modalOverlay').classList.add('open');
}

async function saveOrder(editId) {
  const name  = document.getElementById('f-name').value.trim();
  const items = document.getElementById('f-items').value.trim();
  if (!name || !items) { showToast('Customer name and items are required', 'error'); return; }

  const body = {
    customer_name:  name,
    customer_phone: document.getElementById('f-phone').value.trim(),
    customer_email: document.getElementById('f-email').value.trim(),
    items,
    amount:         parseFloat(document.getElementById('f-amount').value) || 0,
    outlet:         document.getElementById('f-outlet').value,
    order_date:     document.getElementById('f-odate').value,
    delivery_date:  document.getElementById('f-ddate').value,
    payment_method: document.getElementById('f-pay').value,
    platform:       document.getElementById('f-platform').value,
    status:         document.getElementById('f-status').value,
    notes:          document.getElementById('f-notes').value.trim(),
  };

  const btn = document.getElementById('modalSaveBtn');
  btn.textContent = 'Saving…'; btn.disabled = true;
  try {
    let saved;
    if (editId) {
      saved = await apiFetch(`/api/orders/${editId}`, 'PUT', body);
      const idx = allOrders.findIndex(o => o.id === editId);
      if (idx !== -1) allOrders[idx] = saved;
      showToast('Order updated ✓');
    } else {
      saved = await apiFetch('/api/orders', 'POST', body);
      allOrders.unshift(saved);
      showToast('Order logged ✓');
    }
    closeModal();
    renderKPIs();
    filterOrders();
    document.getElementById('order-sub').textContent = `${allOrders.length} total orders`;
  } catch (e) { showToast(e.message || 'Failed to save', 'error'); }
  finally { btn.textContent = 'Save Order'; btn.disabled = false; }
}

async function deleteOrder(id) {
  if (!confirm('Delete this order? This cannot be undone.')) return;
  try {
    await apiFetch(`/api/orders/${id}`, 'DELETE');
    allOrders = allOrders.filter(o => o.id !== id);
    renderKPIs(); filterOrders();
    showToast('Order deleted');
  } catch (e) { showToast('Failed to delete', 'error'); }
}

function exportCSV() {
  const q      = document.getElementById('search').value.toLowerCase();
  const status = document.getElementById('f-status').value;
  const outlet = document.getElementById('f-outlet').value;
  let list = allOrders.filter(o => {
    if (q && !((o.customer_name||'').toLowerCase().includes(q)) && !(o.items||'').toLowerCase().includes(q)) return false;
    if (status && o.status !== status) return false;
    if (outlet && o.outlet !== outlet) return false;
    return true;
  });
  const headers = ['ID','Customer','Phone','Items','Amount','Outlet','Order Date','Delivery Date','Payment','Status','Notes'];
  const rows = list.map(o => [
    o.id, o.customer_name||o.customerName, o.customer_phone||o.customerPhone||'',
    o.items, o.amount||'', OUTLET_LABELS[o.outlet]||o.outlet||'',
    (o.order_date||o.orderDate||'').slice(0,10),
    (o.delivery_date||o.deliveryDate||'').slice(0,10),
    o.payment_method||o.paymentMethod||'',
    o.status, o.notes||''
  ].map(v => `"${String(v).replace(/"/g,'""')}"`));
  const csv = [headers, ...rows].map(r => r.join(',')).join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
  a.download = `krispies-orders-${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}

// Pre-select filter from URL
const urlStatus = new URLSearchParams(location.search).get('status');
if (urlStatus) document.getElementById('f-status').value = urlStatus;

loadOrders().then(filterOrders);
</script>
</body>
</html>
